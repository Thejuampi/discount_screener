    notes:
      - Implemented deterministic pure-core analyzers for Evidence Strength, Expected Value Range, Correlation Risk, Trend Reliability, and Similar Setups.
      - EV uses DCF three-anchor scenarios first, analyst low/primary/high fallback, and keeps one/two-anchor cases sparse/reference-only.
      - Correlation Risk uses selected-range local close-to-close return correlation only, from already-loaded local candle series.
      - Trend Reliability uses least-squares fit over loaded selected candles with the 200 bps flat materiality rule.
      - Similar Setups uses current-universe comparable feature vectors only, top-three gating, exact-two sparse behavior, and deterministic ordering.
      - Repository builds selected-detail reports from existing local selected-detail state and in-memory caches; row summaries are bounded and do not fetch provider, SQLite history, DCF, chart, revision, or comparable data.
