risks:
  - Row chip UX and selected-detail-only architecture depend on Story 1.4's bounded row-summary discipline; no full list-wide Quant Lens computation at startup.
  - Correlation and similar setups may remain sparse until local history/current-feature inputs exist; visible sparse states are required.
