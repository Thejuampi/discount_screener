name: discount_screener
description: Multiplatform Discount Screener (Android, iOS/iPad, Windows desktop).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ds_core:
    path: packages/ds_core
  ds_data:
    path: packages/ds_data
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.0
  http: ^1.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/profiles/
