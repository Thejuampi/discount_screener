<rect x="0.00" y="0.00" width="1214.00" height="692.00" class="bg" style="" /><line class="thin-axis" x1="30.00" y1="35.00" x2="30.00" y2="215.00" /><line class="thin-axis" x1="410.00" y1="35.00" x2="410.00" y2="215.00" /><line class="thin-axis" x1="790.00" y1="35.00" x2="790.00" y2="215.00" /><line class="thin-axis" x1="1180.00" y1="35.00" x2="1180.00" y2="215.00" /><line class="thin-axis" x1="30.00" y1="35.00" x2="1180.00" y2="35.00" /><line class="thin-axis" x1="30.00" y1="65.00" x2="1180.00" y2="65.00" /><line class="thin-axis" x1="30.00" y1="215.00" x2="1180.00" y2="215.00" /><text class="text serif" x="220.00" y="57.00" text-anchor="middle" style="font-size:18px">Subset selection (stepwises)</text><text class="text serif" x="600.00" y="57.00" text-anchor="middle" style="font-size:18px">Ridge</text><text class="text serif" x="985.00" y="57.00" text-anchor="middle" style="font-size:18px">Lasso</text><text class="text serif" x="45.00" y="95.00" text-anchor="start" style="font-size:18px">“Hard thresholding”, completely</text><text class="text serif" x="45.00" y="119.00" text-anchor="start" style="font-size:18px">drops/truncates features beyond</text><text class="text serif" x="45.00" y="143.00" text-anchor="start" style="font-size:18px">the desired subset size.</text><text class="text serif" x="425.00" y="95.00" text-anchor="start" style="font-size:18px">Proportional shrinkage, most</text><text class="text serif" x="425.00" y="119.00" text-anchor="start" style="font-size:18px">important features are shrunk less</text><text class="text serif" x="425.00" y="143.00" text-anchor="start" style="font-size:18px">than least important features.</text><text class="text serif" x="805.00" y="95.00" text-anchor="start" style="font-size:18px">“Soft thresholding”, transforms</text><text class="text serif" x="805.00" y="119.00" text-anchor="start" style="font-size:18px">each coefficient by the same</text><text class="text serif" x="805.00" y="143.00" text-anchor="start" style="font-size:18px">constant factor and truncates at 0.</text><line class="thin-axis" x1="300.00" y1="250.00" x2="920.00" y2="250.00" /><line class="thin-axis" x1="300.00" y1="295.00" x2="920.00" y2="295.00" /><line class="thin-axis" x1="300.00" y1="460.00" x2="920.00" y2="460.00" /><text class="text serif" x="460.00" y="281.00" text-anchor="middle" style="font-size:26px;fill:#666">Estimator</text><text class="text serif" x="730.00" y="281.00" text-anchor="middle" style="font-size:26px;fill:#666">Formula</text><text class="text serif" x="320.00" y="330.00" text-anchor="start" style="font-size:24px;fill:#555">Best subset (size M)</text><text class="math" x="690.00" y="330.00" text-anchor="middle" style="font-size:24px;fill:#555">β̂j · I(|β̂j| ≥ |β̂(M)|)</text><text class="text serif" x="320.00" y="375.00" text-anchor="start" style="font-size:24px;fill:#555">Ridge</text><text class="math" x="690.00" y="375.00" text-anchor="middle" style="font-size:24px;fill:#555">β̂j / (1+λ)</text><text class="text serif" x="320.00" y="420.00" text-anchor="start" style="font-size:24px;fill:#555">Lasso</text><text class="math" x="690.00" y="420.00" text-anchor="middle" style="font-size:24px;fill:#555">sign(β̂j)(|β̂j|−λ)+</text><text class="text small" x="175.00" y="480.00" text-anchor="middle" style="fill:#4fa2bd">Best Subset</text><line class="thin-axis" x1="55.00" y1="582.50" x2="295.00" y2="582.50" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="175.00" y1="520.00" x2="175.00" y2="645.00" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="75.00" y1="635.00" x2="275.00" y2="530.00" style="stroke:#b0b0b0;stroke-width:2"/><line class="thin-axis" x1="75.00" y1="635.00" x2="140.00" y2="602.50" style="stroke:#dd6d7a;stroke-width:2"/><line class="thin-axis" x1="140.00" y1="582.50" x2="210.00" y2="582.50" style="stroke:#dd6d7a;stroke-width:2;stroke-dasharray:6 5"/><line class="thin-axis" x1="210.00" y1="562.50" x2="275.00" y2="530.00" style="stroke:#dd6d7a;stroke-width:2"/><text class="text tiny" x="183.00" y="600.50" text-anchor="start" >(0,0)</text><text class="text small" x="565.00" y="480.00" text-anchor="middle" style="fill:#4fa2bd">Ridge</text><line class="thin-axis" x1="445.00" y1="582.50" x2="685.00" y2="582.50" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="565.00" y1="520.00" x2="565.00" y2="645.00" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="465.00" y1="635.00" x2="665.00" y2="530.00" style="stroke:#b0b0b0;stroke-width:2"/><line class="thin-axis" x1="465.00" y1="627.50" x2="665.00" y2="537.50" style="stroke:#dd6d7a;stroke-width:2;stroke-dasharray:7 6"/><text class="text tiny" x="573.00" y="600.50" text-anchor="start" >(0,0)</text><text class="text small" x="955.00" y="480.00" text-anchor="middle" style="fill:#4fa2bd">Lasso</text><line class="thin-axis" x1="835.00" y1="582.50" x2="1075.00" y2="582.50" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="955.00" y1="520.00" x2="955.00" y2="645.00" style="stroke:#444;stroke-width:1.3"/><line class="thin-axis" x1="855.00" y1="635.00" x2="1055.00" y2="530.00" style="stroke:#b0b0b0;stroke-width:2"/><line class="thin-axis" x1="860.00" y1="620.50" x2="920.00" y2="582.50" style="stroke:#dd6d7a;stroke-width:2;stroke-dasharray:7 6"/><line class="thin-axis" x1="920.00" y1="582.50" x2="990.00" y2="582.50" style="stroke:#dd6d7a;stroke-width:2;stroke-dasharray:7 6"/><line class="thin-axis" x1="990.00" y1="582.50" x2="1050.00" y2="544.50" style="stroke:#dd6d7a;stroke-width:2;stroke-dasharray:7 6"/><text class="text tiny" x="963.00" y="600.50" text-anchor="start" >(0,0)</text></svg>
