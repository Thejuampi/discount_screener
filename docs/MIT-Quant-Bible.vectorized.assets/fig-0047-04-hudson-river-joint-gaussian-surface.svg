<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 586 448" width="586" height="448" role="img" aria-labelledby="title desc">
  <title id="title">Perspective surface plot of a joint Gaussian density</title>
  <desc id="desc">A standalone semantic SVG reconstruction of a 3D perspective plot. The x1 axis runs from minus 1 to 5 along the front edge, the x2 axis runs from 0 to 6 along the right edge, and the vertical axis f shows density values 0.1, 0.2, and 0.3 on the left. A rainbow-banded bell-shaped joint Gaussian density rises above a dark blue floor plane inside a wireframe 3D box.</desc>
  <style>
    .serif { font-family: "Times New Roman", Georgia, serif; }
    .axis { stroke: #000000; stroke-width: 1.15; stroke-linecap: round; }
    .dash { stroke: #000000; stroke-width: 1; stroke-dasharray: 3 4; stroke-linecap: round; opacity: 0.85; }
    .tick { stroke: #000000; stroke-width: 1; }
    .tick-label { fill: #000000; font-size: 14px; }
    .axis-label { fill: #000000; font-size: 26px; font-style: italic; }
  </style>

  <rect width="586" height="448" fill="#ffffff"/>

  <defs>
    <clipPath id="floorClip">
      <polygon points="42,286 394,365 544,212 189,134"/>
    </clipPath>
  </defs>

  <polygon points="42,286 394,365 544,212 189,134" fill="#0a0aa9"/>

  <g clip-path="url(#floorClip)">
    <ellipse cx="292" cy="272" rx="118" ry="46" fill="#1717ff"/>
    <ellipse cx="292" cy="258" rx="105" ry="41" fill="#1f29ff"/>
    <ellipse cx="292" cy="244" rx="93" ry="36" fill="#2146ff"/>
    <ellipse cx="292" cy="230" rx="82" ry="32" fill="#1f66ff"/>
    <ellipse cx="292" cy="216" rx="71" ry="28" fill="#1b93ff"/>
    <ellipse cx="292" cy="202" rx="60" ry="23" fill="#26dbff"/>
    <ellipse cx="292" cy="188" rx="49" ry="19" fill="#65ffbf"/>
    <ellipse cx="292" cy="172" rx="39" ry="15" fill="#ccff35"/>
    <ellipse cx="292" cy="155" rx="31" ry="12" fill="#fff13b"/>
    <ellipse cx="292" cy="139" rx="24" ry="10" fill="#ffb424"/>
    <ellipse cx="292" cy="124" rx="18" ry="7" fill="#ff6112"/>
    <ellipse cx="292" cy="111" rx="13" ry="5" fill="#b50000"/>
  </g>

  <g>
    <line class="axis" x1="42" y1="286" x2="394" y2="365"/>
    <line class="axis" x1="394" y1="365" x2="544" y2="212"/>
    <line class="axis" x1="42" y1="286" x2="189" y2="134"/>
    <line class="axis" x1="42" y1="286" x2="28" y2="104"/>
    <line class="axis" x1="189" y1="134" x2="194" y2="5"/>
    <line class="axis" x1="194" y1="5" x2="554" y2="58"/>
    <line class="axis" x1="554" y1="58" x2="544" y2="212"/>
    <line class="axis" x1="28" y1="104" x2="194" y2="5"/>
    <line class="dash" x1="28" y1="104" x2="554" y2="58"/>
    <line class="dash" x1="28" y1="104" x2="544" y2="212"/>
  </g>

  <g>
    <line class="tick" x1="42" y1="286" x2="36" y2="291"/>
    <line class="tick" x1="92" y1="297" x2="86" y2="302"/>
    <line class="tick" x1="143" y1="309" x2="137" y2="314"/>
    <line class="tick" x1="193" y1="320" x2="187" y2="325"/>
    <line class="tick" x1="243" y1="331" x2="237" y2="336"/>
    <line class="tick" x1="293" y1="343" x2="287" y2="348"/>
    <line class="tick" x1="343" y1="354" x2="337" y2="359"/>
    <text class="serif tick-label" x="34" y="302">-1</text>
    <text class="serif tick-label" x="86" y="313">0</text>
    <text class="serif tick-label" x="137" y="325">1</text>
    <text class="serif tick-label" x="188" y="336">2</text>
    <text class="serif tick-label" x="239" y="348">3</text>
    <text class="serif tick-label" x="289" y="360">4</text>
    <text class="serif tick-label" x="340" y="371">5</text>
    <text class="serif axis-label" x="250" y="396" transform="rotate(-12 250 396)">x<tspan dy="6" font-size="17">1</tspan></text>
  </g>

  <g>
    <line class="tick" x1="394" y1="365" x2="401" y2="372"/>
    <line class="tick" x1="419" y1="340" x2="426" y2="347"/>
    <line class="tick" x1="444" y1="314" x2="451" y2="321"/>
    <line class="tick" x1="469" y1="289" x2="476" y2="296"/>
    <line class="tick" x1="494" y1="263" x2="501" y2="270"/>
    <line class="tick" x1="519" y1="238" x2="526" y2="245"/>
    <line class="tick" x1="544" y1="212" x2="551" y2="219"/>
    <text class="serif tick-label" x="402" y="385">0</text>
    <text class="serif tick-label" x="428" y="359">1</text>
    <text class="serif tick-label" x="453" y="333">2</text>
    <text class="serif tick-label" x="478" y="308">3</text>
    <text class="serif tick-label" x="503" y="282">4</text>
    <text class="serif tick-label" x="528" y="256">5</text>
    <text class="serif tick-label" x="553" y="230">6</text>
    <text class="serif axis-label" x="480" y="301" transform="rotate(61 480 301)">x<tspan dy="6" font-size="17">2</tspan></text>
  </g>

  <g>
    <line class="tick" x1="39" y1="227" x2="27" y2="226"/>
    <line class="tick" x1="35" y1="166" x2="23" y2="165"/>
    <line class="tick" x1="31" y1="105" x2="19" y2="104"/>
    <text class="serif tick-label" x="8" y="230">0.1</text>
    <text class="serif tick-label" x="5" y="170">0.2</text>
    <text class="serif tick-label" x="2" y="109">0.3</text>
    <text class="serif axis-label" x="18" y="220" transform="rotate(-90 18 220)">f</text>
  </g>
</svg>