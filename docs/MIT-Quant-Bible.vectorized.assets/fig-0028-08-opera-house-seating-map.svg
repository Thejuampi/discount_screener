<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 781 445" width="781" height="445" role="img" aria-labelledby="title desc">
  <title id="title">Ticketing seating map with Section 118 highlighted</title>
  <desc id="desc">A semantic reconstruction of a resale ticketing interface. The top chrome includes tabs, a price slider, a resale toggle, offer filters, social icons, accessibility controls, and reset. Below, a hockey arena seating bowl surrounds the rink, with Section 118 highlighted in dark gray at the lower-left side of the lower bowl. A centered popup card previews the view from Section 118 and invites the user to click the section to see seats.</desc>
